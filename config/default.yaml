layers:
  layer1:
    scanner_type: masscan
    batch_size: 10
    backpressure: block
    masscan_path: masscan
    scan_rate: 1000
    wait: 15              # seconds masscan waits per probe for a response
    output_file: data/scans/results.txt

  layer2:
    worker_pool:
      max_concurrent: 200
    prober_timeout: 15         # seconds per probe request (http, https, rtsp, onvif, favicon)
    import_feed_batch: 50      # entries per feed batch during masscan import
    import_feed_interval: 5     # seconds between feed batches
    log_raw_responses: false   # store prober raw responses to raw_responses table
    modules:
      - favicon
      - http
      - https
      - rtsp
      - onvif
    router_strategy: optimistic
    signatures_dir: config/signatures

storage:
  backend: sqlite
  path: data/camera_scan.db

queue:
  maxsize: 1000
  type: in_memory

layer3:
  enabled: false
  nvd:
    api_key: ""
    base_url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
    rate_limit: 50
  msf:
    host: "127.0.0.1"
    port: 55553
    password: "1"
    module_types:
      - exploit
      - auxiliary
    batch_size: 200
    check_timeout: 30
  target_concurrency: 200
  module_concurrency: 32